<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 &amp; AI Opportunities</title>
    <style>
:root,[data-theme="dark"]{
    --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--border-m:#21262d;
    --text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--accent-m:rgba(31,111,235,0.13);
    --green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--cyan:#39d2c0;
    --green-bg:rgba(63,185,80,0.12);--yellow-bg:rgba(210,153,34,0.12);
    --red-bg:rgba(248,81,73,0.12);--purple-bg:rgba(188,140,255,0.12);
    --cyan-bg:rgba(57,210,192,0.12);--blue-bg:rgba(88,166,255,0.12);
}
[data-theme="light"]{
    --bg:#fff;--bg2:#f6f8fa;--bg3:#e8ecf0;--border:#d0d7de;--border-m:#d8dee4;
    --text:#1f2328;--text2:#656d76;--accent:#0969da;--accent-m:rgba(9,105,218,0.1);
    --green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--purple:#8250df;--cyan:#0e8a7a;
    --green-bg:rgba(26,127,55,0.08);--yellow-bg:rgba(154,103,0,0.08);
    --red-bg:rgba(207,34,46,0.08);--purple-bg:rgba(130,80,223,0.08);
    --cyan-bg:rgba(14,138,122,0.08);--blue-bg:rgba(9,105,218,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
.container{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--border-m)}
h1{font-size:1.5rem;color:var(--accent)}
.subtitle{color:var(--text2);font-size:.82rem}
.header-actions{display:flex;gap:.6rem;align-items:center}
.icon-link{color:var(--text2);transition:color .2s}.icon-link:hover{color:var(--accent)}
.theme-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem;cursor:pointer;color:var(--text2);display:flex;align-items:center;transition:color .2s,border-color .2s}
.theme-btn:hover{color:var(--accent);border-color:var(--accent)}

.stats{display:flex;gap:1.5rem;font-size:.82rem;color:var(--text2);margin-bottom:.8rem}
.stats strong{color:var(--accent)}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;gap:.5rem;flex-wrap:wrap}
.tabs{display:flex;gap:.3rem;flex-wrap:wrap}
.tab{padding:.22rem .65rem;border-radius:14px;font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .2s}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent-m);color:var(--accent);border-color:var(--accent)}
.tab .ct{margin-left:.2rem;opacity:.7}

#search{width:100%;padding:.4rem .8rem;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;margin-bottom:.6rem;transition:background .3s,border-color .3s,color .3s}
#search:focus{outline:none;border-color:var(--accent)}

/* Cards */
.feed{display:flex;flex-direction:column;gap:.5rem}
.card{background:var(--bg2);border:1px solid var(--border-m);border-radius:8px;padding:.7rem 1rem;transition:border-color .2s;display:grid;grid-template-columns:1fr auto;gap:.15rem .6rem}
.card:hover{border-color:var(--border)}
.card-top{display:flex;align-items:center;gap:.4rem;min-width:0}
.card-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-title a{color:var(--text);text-decoration:none}.card-title a:hover{color:var(--accent)}
.card-right{display:flex;align-items:center;gap:.5rem;justify-self:end;white-space:nowrap}
.card-meta{grid-column:1/-1;font-size:.75rem;color:var(--text2);display:flex;flex-wrap:wrap;gap:0}
.card-meta span{margin-right:.7rem}
.card-desc{grid-column:1/-1;font-size:.78rem;color:var(--text2);line-height:1.5}
.card-tags{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.15rem}

.badge{display:inline-block;padding:.08rem .45rem;border-radius:10px;font-size:.66rem;font-weight:500;white-space:nowrap}
.badge-hackathon{background:var(--green-bg);color:var(--green)}
.badge-grant{background:var(--purple-bg);color:var(--purple)}
.badge-bounty{background:var(--red-bg);color:var(--red)}
.badge-accelerator{background:var(--cyan-bg);color:var(--cyan)}
.badge-quest{background:var(--yellow-bg);color:var(--yellow)}
.badge-ai{background:var(--blue-bg);color:var(--accent)}

.prize{color:var(--green);font-weight:600;font-size:.78rem}
.dl{font-size:.72rem}.dl.urgent{color:var(--red);font-weight:500}.dl.soon{color:var(--yellow)}
.tag{display:inline-block;padding:.04rem .38rem;background:var(--bg3);border-radius:10px;font-size:.64rem;color:var(--text2)}
.loc{font-size:.72rem;color:var(--text2)}
.platform{font-size:.72rem;color:var(--accent);opacity:.8}

.section-hd{font-size:.88rem;color:var(--accent);margin:1.2rem 0 .5rem;padding-bottom:.25rem;border-bottom:1px solid var(--border-m);display:flex;justify-content:space-between;align-items:center}
.section-hd .ct{font-size:.75rem;color:var(--text2);font-weight:400}

.empty{text-align:center;color:var(--text2);padding:2.5rem;font-size:.9rem}
footer{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border-m);text-align:center;font-size:.76rem;color:var(--text2)}
footer a{color:var(--accent);text-decoration:none}

@media(max-width:640px){
    .toolbar{flex-direction:column;align-items:flex-start}
    .card{grid-template-columns:1fr}
    .card-right{justify-self:start;flex-wrap:wrap}
    .stats{flex-direction:column;gap:.2rem}
}
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>Web3 &amp; AI Opportunities</h1>
            <p class="subtitle">Hackathons, grants, bounties &amp; funding &mdash; auto-updated weekly</p>
        </div>
        <div class="header-actions">
            <a href="../" class="icon-link" title="Homepage"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
            <a href="../dashboard/" class="icon-link" title="Dashboard"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></a>
            <a href="../papers/" class="icon-link" title="Paper Tracker"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></a>
            <button id="theme-toggle" class="theme-btn" title="Toggle theme">
                <svg id="icon-moon" height="20" width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg id="icon-sun" height="20" width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </header>

    <div class="stats">
        <span><strong id="total-ct">0</strong> opportunities</span>
        <span><strong id="upcoming-ct">0</strong> with deadlines</span>
        <span>Last updated: <strong id="last-updated">-</strong></span>
    </div>

    <input type="text" id="search" placeholder="Search by name, platform, tag...">

    <div class="toolbar">
        <div class="tabs" id="tabs"></div>
    </div>

    <div class="feed" id="feed"></div>

    <footer>
        <p><a href="../">Shengchen Ling</a> &middot; Auto-fetched from ETHGlobal, DoraHacks, Devpost, Lablab.ai, Superteam &amp; more</p>
    </footer>
</div>

<script>
(function(){const s=localStorage.getItem('theme');if(s){document.documentElement.setAttribute('data-theme',s);
if(s==='light'){document.getElementById('icon-moon').style.display='none';document.getElementById('icon-sun').style.display='block'}}})();
document.getElementById('theme-toggle').addEventListener('click',()=>{
    const h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';
    h.setAttribute('data-theme',n);localStorage.setItem('theme',n);
    document.getElementById('icon-moon').style.display=n==='dark'?'block':'none';
    document.getElementById('icon-sun').style.display=n==='light'?'block':'none';
});

const CATS={hackathon:'Hackathon',grant:'Grant',bounty:'Bounty',accelerator:'Accelerator',quest:'Quest',ai:'AI'};
const CAT_CLS={hackathon:'badge-hackathon',grant:'badge-grant',bounty:'badge-bounty',accelerator:'badge-accelerator',quest:'badge-quest',ai:'badge-ai'};

let allItems=[];
let activeTab='all';

function today(){return new Date().toISOString().slice(0,10)}

function dlInfo(d){
    if(!d)return{text:'Rolling / Open',cls:'dl',sort:'9999'};
    const diff=Math.ceil((new Date(d)-new Date())/86400000);
    let cls='dl';
    if(diff<0)return{text:`Ended ${-diff}d ago`,cls:'dl',sort:d};
    if(diff<=7){cls='dl urgent';return{text:`${d} (${diff}d left)`,cls,sort:d}}
    if(diff<=30){cls='dl soon';return{text:`${d} (${diff}d)`,cls,sort:d}}
    return{text:d,cls:'dl',sort:d};
}

function render(){
    const search=document.getElementById('search').value.toLowerCase();
    let filtered=activeTab==='all'?allItems:allItems.filter(i=>i.category===activeTab);
    if(search)filtered=filtered.filter(i=>
        (i.title||'').toLowerCase().includes(search)||
        (i.platform||'').toLowerCase().includes(search)||
        (i.description||'').toLowerCase().includes(search)||
        (i.tags||[]).join(' ').toLowerCase().includes(search)
    );

    // Tabs
    const cats={all:allItems.length};
    allItems.forEach(i=>{cats[i.category]=(cats[i.category]||0)+1});
    document.getElementById('tabs').innerHTML=Object.entries({all:'All',...CATS}).map(([k,v])=>
        (k==='all'||cats[k])?`<span class="tab ${activeTab===k?'active':''}" onclick="setTab('${k}')">${v}<span class="ct">${cats[k]||0}</span></span>`:''
    ).join('');

    // Stats
    document.getElementById('total-ct').textContent=allItems.length;
    document.getElementById('upcoming-ct').textContent=allItems.filter(i=>i.deadline&&i.deadline>=today()).length;
    const dates=allItems.map(i=>i.fetched).filter(Boolean).sort().reverse();
    document.getElementById('last-updated').textContent=dates[0]||'-';

    // Group: upcoming (has future deadline) → rolling (no deadline) → past
    const upcoming=[],rolling=[],past=[];
    const now=today();
    filtered.forEach(i=>{
        if(!i.deadline)rolling.push(i);
        else if(i.deadline>=now)upcoming.push(i);
        else past.push(i);
    });
    upcoming.sort((a,b)=>(a.deadline||'').localeCompare(b.deadline||''));
    rolling.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
    past.sort((a,b)=>(b.deadline||'').localeCompare(a.deadline||''));

    let html='';
    if(upcoming.length){
        html+=`<div class="section-hd">Upcoming <span class="ct">${upcoming.length}</span></div>`;
        html+=upcoming.map(renderCard).join('');
    }
    if(rolling.length){
        html+=`<div class="section-hd">Rolling / Always Open <span class="ct">${rolling.length}</span></div>`;
        html+=rolling.map(renderCard).join('');
    }
    if(past.length){
        html+=`<div class="section-hd">Recently Ended <span class="ct">${past.length}</span></div>`;
        html+=past.map(renderCard).join('');
    }
    if(!html)html='<div class="empty">No opportunities found.</div>';

    document.getElementById('feed').innerHTML=html;
}

function renderCard(i){
    const dl=dlInfo(i.deadline);
    const titleHtml=i.url?`<a href="${i.url}" target="_blank">${esc(i.title)}</a>`:esc(i.title);
    const tags=(i.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    const loc=i.location?`<span class="loc">${esc(i.location)}</span>`:'';
    const dates=i.start_date&&i.deadline?`<span>${i.start_date} ~ ${i.deadline}</span>`:
               i.start_date?`<span>From ${i.start_date}</span>`:
               i.deadline?`<span>${dl.text}</span>`:'<span>Rolling</span>';

    return `<div class="card">
        <div class="card-top">
            <span class="badge ${CAT_CLS[i.category]||''}">${CATS[i.category]||i.category}</span>
            <span class="card-title">${titleHtml}</span>
        </div>
        <div class="card-right">
            ${i.prize?`<span class="prize">${esc(i.prize)}</span>`:''}
            <span class="${dl.cls}">${dl.text}</span>
        </div>
        <div class="card-meta">
            <span class="platform">${esc(i.platform||'')}</span>
            ${loc}${dates}
        </div>
        ${i.description?`<div class="card-desc">${esc(i.description)}</div>`:''}
        ${tags?`<div class="card-tags">${tags}</div>`:''}
    </div>`;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

window.setTab=function(t){activeTab=t;render()};

// Load data
fetch('opportunities.json').then(r=>r.json()).then(data=>{
    allItems=data;
    render();
}).catch(e=>{
    document.getElementById('feed').innerHTML='<div class="empty">Failed to load data.</div>';
});

document.getElementById('search').addEventListener('input',render);
</script>
</body>
</html>
