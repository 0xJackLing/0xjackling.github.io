<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 &amp; AI Opportunities</title>
    <style>
:root,[data-theme="dark"]{
    --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
    --border:#30363d;--border-m:#21262d;
    --text:#c9d1d9;--text2:#8b949e;
    --accent:#58a6ff;--accent-m:rgba(31,111,235,0.13);
    --green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--cyan:#39d2c0;
    --green-bg:rgba(63,185,80,0.12);--yellow-bg:rgba(210,153,34,0.12);
    --red-bg:rgba(248,81,73,0.12);--purple-bg:rgba(188,140,255,0.12);
    --cyan-bg:rgba(57,210,192,0.12);--blue-bg:rgba(88,166,255,0.12);
}
[data-theme="light"]{
    --bg:#fff;--bg2:#f6f8fa;--bg3:#e8ecf0;
    --border:#d0d7de;--border-m:#d8dee4;
    --text:#1f2328;--text2:#656d76;
    --accent:#0969da;--accent-m:rgba(9,105,218,0.1);
    --green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--purple:#8250df;--cyan:#0e8a7a;
    --green-bg:rgba(26,127,55,0.08);--yellow-bg:rgba(154,103,0,0.08);
    --red-bg:rgba(207,34,46,0.08);--purple-bg:rgba(130,80,223,0.08);
    --cyan-bg:rgba(14,138,122,0.08);--blue-bg:rgba(9,105,218,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
.container{max-width:1060px;margin:0 auto;padding:1.5rem 1rem}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--border-m)}
h1{font-size:1.5rem;color:var(--accent)}
.subtitle{color:var(--text2);font-size:.85rem}
.header-actions{display:flex;gap:.6rem;align-items:center}
.icon-link{color:var(--text2);transition:color .2s}
.icon-link:hover{color:var(--accent)}
.theme-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem;cursor:pointer;color:var(--text2);display:flex;align-items:center;transition:color .2s,border-color .2s}
.theme-btn:hover{color:var(--accent);border-color:var(--accent)}

/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;gap:.5rem;flex-wrap:wrap}
.tabs{display:flex;gap:.35rem;flex-wrap:wrap}
.tab{padding:.25rem .7rem;border-radius:16px;font-size:.8rem;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .2s}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent-m);color:var(--accent);border-color:var(--accent)}
.tab .count{margin-left:.25rem;opacity:.7}
.toolbar-right{display:flex;gap:.4rem;align-items:center}
.btn-add{padding:.25rem .8rem;border-radius:6px;border:1px solid var(--accent);background:var(--accent-m);color:var(--accent);cursor:pointer;font-size:.8rem;transition:all .2s}
.btn-add:hover{background:var(--accent);color:#fff}

/* Search */
.search-row{margin-bottom:.8rem}
#search{width:100%;padding:.4rem .8rem;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;transition:background .3s,border-color .3s,color .3s}
#search:focus{outline:none;border-color:var(--accent)}

/* Cards */
.opp-list{display:flex;flex-direction:column;gap:.5rem}
.opp-card{background:var(--bg2);border:1px solid var(--border-m);border-radius:8px;padding:.7rem 1rem;transition:border-color .2s,background .3s;display:grid;grid-template-columns:1fr auto;gap:.3rem .8rem}
.opp-card:hover{border-color:var(--border)}
.opp-top{display:flex;align-items:center;gap:.5rem;min-width:0}
.opp-title{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opp-title a{color:var(--text);text-decoration:none}
.opp-title a:hover{color:var(--accent)}
.opp-right{display:flex;align-items:center;gap:.4rem;justify-self:end}
.opp-meta{grid-column:1/-1;font-size:.76rem;color:var(--text2);display:flex;flex-wrap:wrap;gap:0}
.opp-meta span{margin-right:.8rem}
.opp-desc{grid-column:1/-1;font-size:.8rem;color:var(--text2)}
.opp-bottom{grid-column:1/-1;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}

/* Badges */
.badge{display:inline-block;padding:.1rem .5rem;border-radius:12px;font-size:.68rem;font-weight:500;white-space:nowrap}
.badge-hackathon{background:var(--green-bg);color:var(--green)}
.badge-grant{background:var(--purple-bg);color:var(--purple)}
.badge-bounty{background:var(--red-bg);color:var(--red)}
.badge-accelerator{background:var(--cyan-bg);color:var(--cyan)}
.badge-quest{background:var(--yellow-bg);color:var(--yellow)}
.badge-ai{background:var(--blue-bg);color:var(--accent)}

/* Status */
.status{padding:.1rem .5rem;border-radius:12px;font-size:.68rem;font-weight:500;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.status:hover{opacity:.8}
.status-watching{background:var(--blue-bg);color:var(--accent)}
.status-applying{background:var(--yellow-bg);color:var(--yellow)}
.status-submitted{background:var(--purple-bg);color:var(--purple)}
.status-won{background:var(--green-bg);color:var(--green)}
.status-skipped{background:var(--bg3);color:var(--text2)}

/* Tags */
.tag{display:inline-block;padding:.05rem .4rem;background:var(--bg3);border-radius:10px;font-size:.65rem;color:var(--text2);margin-right:.2rem}

/* Action buttons */
.btn-sm{padding:.15rem .5rem;font-size:.7rem;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger:hover{border-color:var(--red);color:var(--red)}
.card-actions{display:flex;gap:.25rem}
.card-actions .btn-sm{opacity:0;transition:opacity .2s,border-color .2s,color .2s}
.opp-card:hover .card-actions .btn-sm{opacity:1}

/* Prize highlight */
.prize{color:var(--green);font-weight:600;font-size:.78rem}

/* Deadline */
.deadline{font-size:.72rem}
.deadline.urgent{color:var(--red)}
.deadline.soon{color:var(--yellow)}

/* Section headers */
.section-sep{font-size:.82rem;color:var(--accent);margin:1rem 0 .5rem;padding-bottom:.3rem;border-bottom:1px solid var(--border-m)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;width:92%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;color:var(--accent);margin-bottom:1rem}
.form-row{display:flex;gap:.6rem;margin-bottom:.7rem}
.form-row>.form-group{flex:1}
.form-group{margin-bottom:.7rem}
.form-group label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.2rem}
.form-group input,.form-group select,.form-group textarea{
    width:100%;padding:.4rem .6rem;background:var(--bg);border:1px solid var(--border);
    border-radius:6px;color:var(--text);font-size:.85rem;font-family:inherit;transition:background .3s,border-color .3s,color .3s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:50px}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.8rem}
.btn-primary{padding:.4rem .9rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:.85rem}
.btn-primary:hover{opacity:.9}
.btn-cancel{padding:.4rem .9rem;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:.85rem}

.empty-state{text-align:center;color:var(--text2);padding:2.5rem;font-size:.9rem}
footer{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border-m);text-align:center;font-size:.78rem;color:var(--text2)}
footer a{color:var(--accent);text-decoration:none}
.data-actions{margin-top:1.5rem;padding-top:.8rem;border-top:1px solid var(--border-m);display:flex;gap:.5rem;justify-content:center}

/* Preloaded directory toggle */
.dir-toggle{margin-bottom:1rem}
.dir-toggle summary{cursor:pointer;font-size:.85rem;color:var(--accent);padding:.4rem 0}
.dir-toggle summary:hover{text-decoration:underline}
.dir-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:.5rem}
.dir-table th{text-align:left;color:var(--text2);border-bottom:1px solid var(--border);padding:.3rem .5rem;font-weight:500}
.dir-table td{padding:.3rem .5rem;border-bottom:1px solid var(--border-m);color:var(--text)}
.dir-table td a{color:var(--accent)}
.dir-table tr:hover{background:var(--bg3)}
.btn-track{padding:.1rem .4rem;font-size:.65rem;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s}
.btn-track:hover{border-color:var(--green);color:var(--green)}

@media(max-width:640px){
    .toolbar{flex-direction:column;align-items:flex-start}
    .form-row{flex-direction:column;gap:0}
    .opp-card{grid-template-columns:1fr}
    .opp-right{justify-self:start}
}
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>Web3 &amp; AI Opportunities</h1>
            <p class="subtitle">Hackathons, grants, bounties &amp; funding tracker</p>
        </div>
        <div class="header-actions">
            <a href="../" class="icon-link" title="Homepage"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
            <a href="../dashboard/" class="icon-link" title="Research Dashboard"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></a>
            <a href="../papers/" class="icon-link" title="Paper Tracker"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></a>

            </button>
        </div>
    </header>

    <div class="search-row"><input type="text" id="search" placeholder="Search opportunities..."></div>

    <div class="toolbar">
        <div class="tabs" id="tabs"></div>
        <div class="toolbar-right">
            <select id="status-filter" class="btn-sm" style="padding:.25rem .5rem;font-size:.78rem;background:var(--bg2);color:var(--text)">

                <option value="watching">Watching</option>

    <footer>
        <p><a href="../">Shengchen Ling</a> &middot; Data stored locally in your browser</p>
    </footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-title">New Opportunity</h2>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="f-title" placeholder="e.g., ETHGlobal Bangkok 2026">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Category</label>
                <select id="f-category">
                    <option value="hackathon">Hackathon</option>
                    <option value="grant">Grant</option>
                    <option value="bounty">Bounty</option>
                    <option value="accelerator">Accelerator</option>
                    <option value="quest">Quest / Task</option>
                    <option value="ai">AI Competition</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="f-status">
                    <option value="watching">Watching</option>
                    <option value="applying">Applying</option>
                    <option value="submitted">Submitted</option>
                    <option value="won">Won</option>
                    <option value="skipped">Skipped</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Platform / Organizer</label>
                <input type="text" id="f-platform" placeholder="e.g., ETHGlobal, DoraHacks">
            </div>
            <div class="form-group">
                <label>Prize / Reward</label>
                <input type="text" id="f-prize" placeholder="e.g., $50K, 10K USDC">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Deadline</label>
                <div style="display:flex;gap:.3rem;align-items:center">
                    <input type="date" id="f-deadline" style="flex:1">
                    <button type="button" class="btn-sm" onclick="setDL(7)">1w</button>
                    <button type="button" class="btn-sm" onclick="setDL(14)">2w</button>
                    <button type="button" class="btn-sm" onclick="setDL(30)">1m</button>
                    <button type="button" class="btn-sm" onclick="setDL(60)">2m</button>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>URL</label>
            <input type="url" id="f-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Tags (comma-separated)</label>
            <input type="text" id="f-tags" placeholder="e.g., DeFi, Solana, ZK, AI Agent">
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea id="f-notes" placeholder="Ideas, requirements, team..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="saveItem()">Save</button>
        </div>
    </div>
</div>

document.getElementById('theme-toggle').addEventListener('click',()=>{
    const h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';
    h.setAttribute('data-theme',n);localStorage.setItem('theme',n);
    document.getElementById('icon-moon').style.display=n==='dark'?'block':'none';
    document.getElementById('icon-sun').style.display=n==='light'?'block':'none';
});

    {name:'Kaggle',url:'https://kaggle.com',cat:'ai',prize:'Up to $1M',focus:'ML competitions'},
    {name:'Superteam Earn',url:'https://earn.superteam.fun',cat:'quest',prize:'$50-$5K',focus:'Solana bounties + grants'},
    {name:'OnlyDust',url:'https://onlydust.com',cat:'quest',prize:'$100-$5K',focus:'Open-source contributions, Starknet'},
];

function render(){
    // Tabs
    const cats={all:items.length};
    items.forEach(p=>{cats[p.category]=(cats[p.category]||0)+1});
    const tabsEl=document.getElementById('tabs');
    tabsEl.innerHTML=Object.entries({all:'All',...CATS}).map(([k,v])=>
        (k==='all'||cats[k])?`<span class="tab ${activeTab===k?'active':''}" onclick="setTab('${k}')">${v}<span class="count">${cats[k]||0}</span></span>`:''
    ).join('');

    const search=document.getElementById('search').value.toLowerCase();
    const statusF=document.getElementById('status-filter').value;

    let filtered=activeTab==='all'?items:items.filter(p=>p.category===activeTab);
    if(statusF)filtered=filtered.filter(p=>p.status===statusF);
    if(search)filtered=filtered.filter(p=>
        (p.title||'').toLowerCase().includes(search)||
        (p.platform||'').toLowerCase().includes(search)||
        (p.tags||[]).join(' ').toLowerCase().includes(search)||
        (p.notes||'').toLowerCase().includes(search)
    );

    // Sort: applying first, then watching, then by deadline
    filtered.sort((a,b)=>(STATUS_ORDER[a.status]??9)-(STATUS_ORDER[b.status]??9)||(a.deadline||'z').localeCompare(b.deadline||'z'));

    const listEl=document.getElementById('opp-list');
    if(filtered.length===0){
        listEl.innerHTML='<div class="empty-state">No opportunities tracked yet.<br>Add one or pick from the Platform Directory below.</div>';
        return;
    }

    listEl.innerHTML=filtered.map(p=>{
        const tags=(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
        const dl=p.deadline?deadlineLabel(p.deadline):'';
        const prize=p.prize?`<span class="prize">${p.prize}</span>`:'';
        const platform=p.platform?`<span>${p.platform}</span>`:'';
        const titleHtml=p.url?`<a href="${p.url}" target="_blank">${p.title}</a>`:p.title;

        return `<div class="opp-card">
            <div class="opp-top">
                <span class="badge ${CAT_CLS[p.category]||''}">${CATS[p.category]||p.category}</span>
                <span class="opp-title">${titleHtml}</span>
            </div>
            <div class="opp-right">
                ${prize}${dl}
                <span class="status ${STATUS_CLS[p.status]||''}" onclick="cycleStatus('${p.id}')" title="Click to change">${STATUS_LABELS[p.status]||p.status}</span>
                <div class="card-actions">
                    <button class="btn-sm" onclick="editItem('${p.id}')">Edit</button>
                    <button class="btn-sm btn-danger" onclick="deleteItem('${p.id}')">Del</button>
                </div>
            </div>
            <div class="opp-meta">${platform}<span>${tags}</span></div>
            ${p.notes?`<div class="opp-desc">${p.notes}</div>`:''}
        </div>`;
    }).join('');
}

function deadlineLabel(d){
    const diff=Math.ceil((new Date(d)-new Date())/86400000);
    let cls='deadline';
    let text=d;
    if(diff<0){cls+=' urgent';text=`${d} (${-diff}d ago)`}
    else if(diff<=7){cls+=' urgent';text=`${d} (${diff}d)`}
    else if(diff<=30){cls+=' soon';text=`${d} (${diff}d)`}
    return `<span class="${cls}">${text}</span>`;
}

function cycleStatus(id){
    const order=['watching','applying','submitted','won','skipped'];
    const p=items.find(x=>x.id===id);if(!p)return;
    const i=order.indexOf(p.status);
    p.status=order[(i+1)%order.length];
    save();render();
}

function setTab(t){activeTab=t;render()}

function openModal(id){
    document.getElementById('modal').classList.add('show');
    document.getElementById('modal-title').textContent=id?'Edit Opportunity':'New Opportunity';
    if(id){
        const p=items.find(x=>x.id===id);if(!p)return;
        document.getElementById('edit-id').value=p.id;
        document.getElementById('f-title').value=p.title;
        document.getElementById('f-category').value=p.category;
        document.getElementById('f-status').value=p.status;
        document.getElementById('f-platform').value=p.platform||'';
        document.getElementById('f-prize').value=p.prize||'';
        document.getElementById('f-deadline').value=p.deadline||'';
        document.getElementById('f-url').value=p.url||'';
        document.getElementById('f-tags').value=(p.tags||[]).join(', ');
        document.getElementById('f-notes').value=p.notes||'';
    } else {
        document.getElementById('edit-id').value='';
        ['f-title','f-platform','f-prize','f-deadline','f-url','f-tags','f-notes'].forEach(x=>document.getElementById(x).value='');
        document.getElementById('f-category').value='hackathon';
        document.getElementById('f-status').value='watching';
    }
}

function closeModal(){document.getElementById('modal').classList.remove('show')}

function setDL(days){const d=new Date();d.setDate(d.getDate()+days);document.getElementById('f-deadline').value=d.toISOString().slice(0,10)}

function saveItem(){
    const title=document.getElementById('f-title').value.trim();
    if(!title)return alert('Title is required');
    const editId=document.getElementById('edit-id').value;
    const tagsRaw=document.getElementById('f-tags').value;
    const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
    const data={
        id:editId||Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        title,
        category:document.getElementById('f-category').value,
        status:document.getElementById('f-status').value,
        platform:document.getElementById('f-platform').value.trim(),
        prize:document.getElementById('f-prize').value.trim(),
        deadline:document.getElementById('f-deadline').value,
        url:document.getElementById('f-url').value.trim(),
        tags,
        notes:document.getElementById('f-notes').value.trim(),
        updated:today()
    };
    if(editId){const i=items.findIndex(x=>x.id===editId);if(i>=0)items[i]=data}
    else{data.created=today();items.push(data)}
    save();closeModal();render();
}

function editItem(id){openModal(id)}
function deleteItem(id){if(!confirm('Delete?')){return}items=items.filter(x=>x.id!==id);save();render()}

function quickAdd(dir){
    document.getElementById('f-title').value=dir.name;
    document.getElementById('f-category').value=dir.cat;
    document.getElementById('f-platform').value=dir.name;
    document.getElementById('f-url').value=dir.url;
    document.getElementById('f-prize').value=dir.prize||'';
    document.getElementById('f-status').value='watching';
    document.getElementById('f-tags').value=dir.focus||'';
    document.getElementById('f-notes').value='';
    document.getElementById('f-deadline').value='';
    document.getElementById('edit-id').value='';
    document.getElementById('modal-title').textContent='New Opportunity';
    document.getElementById('modal').classList.add('show');
}

function renderDirectory(){
    const t=document.getElementById('dir-table');
    let html='<tr><th>Platform</th><th>Category</th><th>Prize Range</th><th>Focus</th><th></th></tr>';
    DIRECTORY.forEach(d=>{
        html+=`<tr>
            <td><a href="${d.url}" target="_blank">${d.name}</a></td>
            <td><span class="badge ${CAT_CLS[d.cat]||''}">${CATS[d.cat]||d.cat}</span></td>
            <td>${d.prize}</td>
            <td>${d.focus}</td>
            <td><button class="btn-track" onclick='quickAdd(${JSON.stringify(d)})'>+ Track</button></td>
        </tr>`;
    });
    t.innerHTML=html;
}

function exportData(){
    const blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='opportunities_'+today()+'.json';a.click();
}

function importData(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
        if(Array.isArray(d)&&confirm(`Import ${d.length} items? This replaces current data.`)){items=d;save();render()}}
        catch(e){alert('Invalid JSON')}};
    r.readAsText(file);e.target.value='';
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.getElementById('search').addEventListener('input',render);
document.getElementById('status-filter').addEventListener('change',render);

render();
renderDirectory();
</script>
</body>
</html>
