<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Dashboard</title>
    <style>
:root, [data-theme="dark"] {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --border-m: #21262d;
    --text: #c9d1d9; --text2: #8b949e;
    --accent: #58a6ff; --accent-m: rgba(31,111,235,0.13);
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
    --green-bg: rgba(63,185,80,0.12); --yellow-bg: rgba(210,153,34,0.12);
    --red-bg: rgba(248,81,73,0.12); --purple-bg: rgba(188,140,255,0.12);
    --blue-bg: rgba(88,166,255,0.12);
    --lv1: #161b22; --lv2: #0e4429; --lv3: #006d32; --lv4: #26a641;
}
[data-theme="light"] {
    --bg: #fff; --bg2: #f6f8fa; --bg3: #e8ecf0;
    --border: #d0d7de; --border-m: #d8dee4;
    --text: #1f2328; --text2: #656d76;
    --accent: #0969da; --accent-m: rgba(9,105,218,0.1);
    --green: #1a7f37; --yellow: #9a6700; --red: #cf222e; --purple: #8250df;
    --green-bg: rgba(26,127,55,0.08); --yellow-bg: rgba(154,103,0,0.08);
    --red-bg: rgba(207,34,46,0.08); --purple-bg: rgba(130,80,223,0.08);
    --blue-bg: rgba(9,105,218,0.08);
    --lv1: #ebedf0; --lv2: #9be9a8; --lv3: #40c463; --lv4: #216e39;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; transition: background .3s, color .3s; }
.container { max-width:960px; margin:0 auto; padding:1.5rem 1rem; }
header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid var(--border-m); }
h1 { font-size:1.5rem; color:var(--accent); }
.subtitle { color:var(--text2); font-size:.85rem; }
.header-actions { display:flex; gap:.6rem; align-items:center; }
.icon-link { color:var(--text2); transition:color .2s; }
.icon-link:hover { color:var(--accent); }
.theme-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:.3rem; cursor:pointer; color:var(--text2); display:flex; align-items:center; transition: color .2s, border-color .2s; }
.theme-btn:hover { color:var(--accent); border-color:var(--accent); }

.toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.tabs { display:flex; gap:.4rem; flex-wrap:wrap; }
.tab { padding:.3rem .8rem; border-radius:20px; font-size:.82rem; cursor:pointer; border:1px solid var(--border); background:var(--bg2); color:var(--text2); transition:all .2s; }
.tab:hover { border-color:var(--accent); color:var(--accent); }
.tab.active { background:var(--accent-m); color:var(--accent); border-color:var(--accent); }
.tab .count { margin-left:.3rem; opacity:.7; }
.btn-add { padding:.3rem .9rem; border-radius:6px; border:1px solid var(--accent); background:var(--accent-m); color:var(--accent); cursor:pointer; font-size:.82rem; transition:all .2s; }
.btn-add:hover { background:var(--accent); color:#fff; }

.badge { display:inline-block; padding:.1rem .5rem; border-radius:12px; font-size:.7rem; font-weight:500; white-space:nowrap; }
.badge-submitted { background:var(--yellow-bg); color:var(--yellow); }
.badge-active { background:var(--green-bg); color:var(--green); }

.project-list { display:flex; flex-direction:column; gap:.5rem; }
.project-card { background:var(--bg2); border:1px solid var(--border-m); border-radius:8px; padding:.8rem 1rem; transition: border-color .2s, background .3s; }
.project-card:hover { border-color:var(--border); }
.project-header { display:flex; justify-content:space-between; align-items:center; gap:.5rem; }
.project-title { font-size:.95rem; font-weight:600; flex:1; }
.project-meta { font-size:.78rem; color:var(--text2); display:flex; flex-wrap:wrap; gap:0; }
.project-meta span { margin-right:.8rem; }
.project-desc { font-size:.82rem; color:var(--text2); margin-top:.2rem; }

.activity-row { display:flex; align-items:center; gap:.5rem; margin-top:.4rem; flex-wrap:wrap; }
.heatmap { display:flex; gap:2px; }
.heatmap-cell { width:11px; height:11px; border-radius:2px; background:var(--lv1); cursor:default; position:relative; }
.heatmap-cell[data-level="1"] { background:var(--lv2); }
.heatmap-cell[data-level="2"] { background:var(--lv3); }
.heatmap-cell[data-level="3"] { background:var(--lv4); }
.heatmap-cell[title]:hover::after {
    content:attr(title); position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--bg3); color:var(--text); padding:2px 6px; border-radius:4px;
    font-size:.68rem; white-space:nowrap; z-index:10; border:1px solid var(--border);
}
.log-btns { display:flex; gap:.25rem; align-items:center; }
.log-btn { padding:.15rem .5rem; font-size:.7rem; border-radius:4px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; transition:all .15s; }
.log-btn:hover { border-color:var(--accent); color:var(--accent); }
.log-btn.l1:hover { border-color:var(--lv2); color:var(--lv2); }
.log-btn.l2:hover { border-color:var(--lv3); color:var(--lv3); }
.log-btn.l3:hover { border-color:var(--lv4); color:var(--lv4); }
.log-btn.done { opacity:.5; cursor:default; }

.card-actions { display:flex; gap:.3rem; margin-left:auto; }
.card-actions .btn-sm { opacity:0; transition: opacity .2s, border-color .2s, color .2s; }
.project-card:hover .card-actions .btn-sm { opacity:1; }

.btn-sm { padding:.15rem .5rem; font-size:.72rem; border-radius:4px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; transition:all .2s; }
.btn-sm:hover { border-color:var(--accent); color:var(--accent); }
.btn-danger:hover { border-color:var(--red); color:var(--red); }

.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:1.5rem; width:90%; max-width:520px; max-height:90vh; overflow-y:auto; }
.modal h2 { font-size:1.2rem; color:var(--accent); margin-bottom:1rem; }
.form-group { margin-bottom:.8rem; }
.form-group label { display:block; font-size:.82rem; color:var(--text2); margin-bottom:.3rem; }
.form-group input, .form-group select, .form-group textarea {
    width:100%; padding:.5rem .7rem; background:var(--bg); border:1px solid var(--border);
    border-radius:6px; color:var(--text); font-size:.9rem; font-family:inherit; transition: background .3s, border-color .3s, color .3s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--accent); }
.form-group textarea { resize:vertical; min-height:60px; }
.modal-actions { display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem; }
.btn-primary { padding:.5rem 1rem; border-radius:6px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-size:.9rem; }
.btn-primary:hover { opacity:.9; }
.btn-cancel { padding:.5rem 1rem; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; font-size:.9rem; }

.empty-state { text-align:center; color:var(--text2); padding:3rem; font-size:.95rem; }
footer { margin-top:2rem; padding-top:1rem; border-top:1px solid var(--border-m); text-align:center; font-size:.78rem; color:var(--text2); }
footer a { color:var(--accent); text-decoration:none; }
.data-actions { margin-top:1.5rem; padding-top:.8rem; border-top:1px solid var(--border-m); display:flex; gap:.5rem; justify-content:center; }

@media (max-width:600px) {
    .toolbar { flex-direction:column; align-items:flex-start; gap:.5rem; }
    .tabs { gap:.3rem; }
    .tab { padding:.25rem .6rem; font-size:.78rem; }
    header { flex-direction:column; align-items:flex-start; }
    .header-actions { margin-top:.5rem; }
    .heatmap-cell { width:9px; height:9px; }
    .activity-row { flex-direction:column; align-items:flex-start; }
}
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>Research Dashboard</h1>
            <p class="subtitle">Papers, projects, and things in progress</p>
        </div>
        <div class="header-actions">
            <a href="../" class="icon-link" title="Homepage"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
            <a href="../papers/" class="icon-link" title="Paper Tracker"><svg height="22" width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></a>
            <button id="theme-toggle" class="theme-btn" title="Toggle theme">
                <svg id="icon-moon" height="20" width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg id="icon-sun" height="20" width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </header>

    <div class="toolbar">
        <div class="tabs" id="tabs"></div>
        <button class="btn-add" onclick="openModal()">+ New Project</button>
    </div>

    <div class="project-list" id="project-list"></div>

    <div class="data-actions">
        <button class="btn-sm" onclick="exportData()">Export JSON</button>
        <button class="btn-sm" onclick="document.getElementById('import-file').click()">Import JSON</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>

    <footer>
        <p><a href="../">Shengchen Ling</a> &middot; Data stored locally in your browser</p>
    </footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-title">New Project</h2>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="f-title" placeholder="Paper title or project name">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="f-category">
                <option value="paper">Paper</option>
                <option value="project">Project</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="f-status">
                <option value="active">Active / In Progress</option>
                <option value="submitted">Submitted / Under Review</option>
            </select>
        </div>
        <div class="form-group">
            <label>Target Venue / Platform</label>
            <input type="text" id="f-venue" placeholder="e.g., IEEE S&P 2026, GitHub, etc.">
        </div>
        <div class="form-group">
            <label>Collaborators</label>
            <input type="text" id="f-collaborators" placeholder="e.g., Alice, Bob, Prof. Wang">
        </div>
        <div class="form-group">
            <label>Deadline / ETA</label>
            <div style="display:flex;gap:.4rem;align-items:center;">
                <input type="date" id="f-deadline" style="flex:1;">
                <button type="button" class="btn-sm" onclick="setDeadlineOffset(7)">1w</button>
                <button type="button" class="btn-sm" onclick="setDeadlineOffset(14)">2w</button>
                <button type="button" class="btn-sm" onclick="setDeadlineOffset(30)">1m</button>
                <button type="button" class="btn-sm" onclick="setDeadlineOffset(60)">2m</button>
                <button type="button" class="btn-sm" onclick="setDeadlineOffset(90)">3m</button>
            </div>
        </div>
        <div class="form-group">
            <label>Description / Notes</label>
            <textarea id="f-desc" placeholder="Current state, blockers, next steps..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="saveProject()">Save</button>
        </div>
    </div>
</div>

<script>
// Theme
(function(){const s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s)})();
document.getElementById('theme-toggle').addEventListener('click',()=>{
    const h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';
    h.setAttribute('data-theme',n);localStorage.setItem('theme',n);
    document.getElementById('icon-moon').style.display=n==='dark'?'block':'none';
    document.getElementById('icon-sun').style.display=n==='light'?'block':'none';
});

const STORAGE_KEY = 'research_dashboard_projects';
let projects = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let activeTab = 'all';

const CATEGORIES = {paper:'Paper', project:'Project'};
const STATUS_LABELS = {active:'Active', submitted:'Submitted'};
const LEVEL_LABELS = ['Glanced', 'Worked on', 'Major progress'];

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); }

function today() { return new Date().toISOString().slice(0,10); }

function lastNDays(n) {
    const days = [];
    for (let i = n - 1; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0,10));
    }
    return days;
}

function renderHeatmap(project) {
    const logs = project.activity || {};
    const days = lastNDays(28);
    return days.map(d => {
        const lv = logs[d] || 0;
        const label = lv ? `${d}: ${LEVEL_LABELS[lv-1]}` : d;
        return `<div class="heatmap-cell" data-level="${lv}" title="${label}"></div>`;
    }).join('');
}

function logActivity(id, level) {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    if (!p.activity) p.activity = {};
    p.activity[today()] = level;
    save(); render();
}

function todayLogged(project) {
    return (project.activity || {})[today()] || 0;
}

function render() {
    const cats = {all: projects.length};
    projects.forEach(p => { cats[p.category] = (cats[p.category]||0)+1; });
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = Object.entries({all:'All',...CATEGORIES}).map(([k,v]) =>
        cats[k] ? `<span class="tab ${activeTab===k?'active':''}" onclick="setTab('${k}')">${v}<span class="count">${cats[k]}</span></span>` : ''
    ).join('');

    let filtered = activeTab === 'all' ? projects : projects.filter(p => p.category === activeTab);
    const statusOrder = {active:0, submitted:1};
    filtered.sort((a,b) => (statusOrder[a.status]??2) - (statusOrder[b.status]??2) || (a.deadline||'z').localeCompare(b.deadline||'z'));

    const listEl = document.getElementById('project-list');
    if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty-state">No projects yet. Click "+ New Project" to get started.</div>';
        return;
    }

    listEl.innerHTML = filtered.map(p => {
        const deadline = p.deadline ? `<span>Deadline: ${p.deadline}${getDaysLeft(p.deadline)}</span>` : '';
        const collabs = p.collaborators ? `<span>w/ ${p.collaborators}</span>` : '';
        const venue = p.venue ? `<span>${p.venue}</span>` : '';
        const logged = todayLogged(p);

        return `<div class="project-card">
            <div class="project-header">
                <span class="project-title">${p.title}</span>
                <span class="badge badge-${p.status}">${STATUS_LABELS[p.status]||p.status}</span>
            </div>
            <div class="project-meta">${venue}${collabs}${deadline}</div>
            ${p.desc ? `<div class="project-desc">${p.desc}</div>` : ''}
            <div class="activity-row">
                <div class="heatmap">${renderHeatmap(p)}</div>
                <div class="log-btns">
                    <button class="log-btn l1 ${logged>=1?'done':''}" onclick="logActivity('${p.id}',1)" title="Glanced">G</button>
                    <button class="log-btn l2 ${logged>=2?'done':''}" onclick="logActivity('${p.id}',2)" title="Worked on">W</button>
                    <button class="log-btn l3 ${logged>=3?'done':''}" onclick="logActivity('${p.id}',3)" title="Major progress">M</button>
                </div>
                <div class="card-actions">
                    <button class="btn-sm" onclick="editProject('${p.id}')">Edit</button>
                    <button class="btn-sm btn-danger" onclick="deleteProject('${p.id}')">Delete</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function getDaysLeft(deadline) {
    const diff = Math.ceil((new Date(deadline) - new Date()) / 86400000);
    if (diff < 0) return ` (${-diff}d overdue)`;
    if (diff === 0) return ' (today!)';
    if (diff <= 14) return ` (${diff}d)`;
    return '';
}

function setTab(t) { activeTab = t; render(); }

function openModal(id) {
    document.getElementById('modal').classList.add('show');
    document.getElementById('modal-title').textContent = id ? 'Edit Project' : 'New Project';
    if (id) {
        const p = projects.find(x => x.id === id);
        if (!p) return;
        document.getElementById('edit-id').value = p.id;
        document.getElementById('f-title').value = p.title;
        document.getElementById('f-category').value = p.category;
        document.getElementById('f-status').value = p.status;
        document.getElementById('f-venue').value = p.venue || '';
        document.getElementById('f-collaborators').value = p.collaborators || '';
        document.getElementById('f-deadline').value = p.deadline || '';
        document.getElementById('f-desc').value = p.desc || '';
    } else {
        document.getElementById('edit-id').value = '';
        ['f-title','f-venue','f-collaborators','f-deadline','f-desc'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-category').value = 'paper';
        document.getElementById('f-status').value = 'active';
    }
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function setDeadlineOffset(days) {
    const d = new Date(); d.setDate(d.getDate() + days);
    document.getElementById('f-deadline').value = d.toISOString().slice(0, 10);
}

function saveProject() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) return alert('Title is required');
    const editId = document.getElementById('edit-id').value;
    const data = {
        id: editId || Date.now().toString(36) + Math.random().toString(36).slice(2,6),
        title,
        category: document.getElementById('f-category').value,
        status: document.getElementById('f-status').value,
        venue: document.getElementById('f-venue').value.trim(),
        collaborators: document.getElementById('f-collaborators').value.trim(),
        deadline: document.getElementById('f-deadline').value,
        desc: document.getElementById('f-desc').value.trim(),
        updated: today(),
    };
    if (editId) {
        const idx = projects.findIndex(p => p.id === editId);
        if (idx >= 0) { data.activity = projects[idx].activity || {}; projects[idx] = data; }
    } else {
        data.activity = {};
        data.created = data.updated;
        projects.push(data);
    }
    save(); closeModal(); render();
}

function editProject(id) { openModal(id); }

function deleteProject(id) {
    if (!confirm('Delete this project?')) return;
    projects = projects.filter(p => p.id !== id);
    save(); render();
}

function exportData() {
    const blob = new Blob([JSON.stringify(projects, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'research_dashboard_' + today() + '.json';
    a.click();
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data)) {
                if (confirm(`Import ${data.length} projects? This will replace current data.`)) {
                    projects = data; save(); render();
                }
            }
        } catch(e) { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

render();
</script>
</body>
</html>
